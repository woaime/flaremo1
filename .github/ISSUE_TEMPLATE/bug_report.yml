name: Bug report
description: 报告 FlareMo 的可复现问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: 版本
      description: Release tag 或 commit SHA
      placeholder: v0.1.0 或 1596998
    validations:
      required: true
  - type: dropdown
    id: deploy
    attributes:
      label: 部署方式
      options:
        - Deploy to Cloudflare button
        - 手动 Wrangler 部署
        - 本地 wrangler dev
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 写清楚从空白状态到问题出现的步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可以贴 Wrangler 日志、浏览器 console、请求响应或截图
