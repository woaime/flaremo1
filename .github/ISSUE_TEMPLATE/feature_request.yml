name: Feature request
description: 提出 FlareMo 的功能建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你要解决什么问题
      description: 不要只写功能名，说明真实使用场景
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你希望怎么做
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - Web UI
        - Memos-compatible API
        - D1 / Drizzle
        - R2 / attachments
        - Cloudflare Access / deploy
        - MCP
        - Docs
        - Other
    validations:
      required: true
