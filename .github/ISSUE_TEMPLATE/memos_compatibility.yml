name: Memos compatibility
description: 报告 Memos 客户端、脚本或 API 兼容问题
title: "[Memos compatibility]: "
labels: ["memos-compatible"]
body:
  - type: input
    id: client
    attributes:
      label: 客户端或工具
      placeholder: 例如某个 Memos client、脚本或 curl
    validations:
      required: true
  - type: input
    id: endpoint
    attributes:
      label: 请求路径
      placeholder: GET /api/v1/memos
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: 请求
      description: 请求参数、请求体和关键 headers。不要贴 Access secret。
  - type: textarea
    id: response
    attributes:
      label: FlareMo 返回
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望的 Memos 行为
    validations:
      required: true
